name: Automatic 2026 World Cup Data Scraper

on:
  schedule:
    - cron: '*/15 * * * *' # 改为 15 分钟一次，避免被 GitHub 判定为频繁触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 确保拥有写权限

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper Script
        run: npm run cron-update

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/api/worldcup.json
          
          # 检查是否有变动
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "chore: update world cup live data"
            git push origin main
          fi
